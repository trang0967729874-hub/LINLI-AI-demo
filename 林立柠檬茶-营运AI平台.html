    positive: src.positives.map((text) => ({ type: 'positive', text })),
  };
}

const RISK_ORDER = { high: 0, medium: 1, low: 2 };

function sortByRisk(list) {
  return [...list].sort((a, b) => RISK_ORDER[a.riskLevel] - RISK_ORDER[b.riskLevel]);
}

function getRiskLabel(l) {
  return { high: '高风险', medium: '中风险', low: '低风险' }[l];
}

function getStatusLabel(s) {
  return { pending: '待处理', rectifying: '整改中', reviewing: '待复查', closed: '已闭环', rejected: '已驳回' }[s];
}

function getConfidenceColor(c) {
  if (c >= 85) return 'text-green-600';
  if (c >= 70) return 'text-orange-500';
  return 'text-red-500';
}

function getRiskScoreLevel(score) {
  if (score >= 70) return { label: '高风险', className: 'text-red-600 bg-red-50 border-red-200' };
  if (score >= 45) return { label: '中风险', className: 'text-orange-600 bg-orange-50 border-orange-200' };
  return { label: '低风险', className: 'text-blue-600 bg-blue-50 border-blue-200' };
}

function getHeatCellClass(level) {
  return { high: 'bg-red-100 text-red-700', medium: 'bg-orange-100 text-orange-700', low: 'bg-green-100 text-green-700' }[level];
}

function getHeatLabel(level) {
  return { high: '高', medium: '中', low: '低' }[level];
}

function getDaysRemaining(deadline) {
  if (!deadline) return { label: '—', className: 'text-gray-400', isOverdue: false };
  const end = new Date(deadline);
  const diff = Math.ceil((end.getTime() - TODAY.getTime()) / 86400000);
  if (diff < 0) return { label: `逾期${Math.abs(diff)}天`, className: 'text-red-600 bg-red-50 px-2 py-0.5 rounded', isOverdue: true };
  if (diff === 0) return { label: '今日截止', className: 'text-orange-600 bg-orange-50 px-2 py-0.5 rounded', isOverdue: false };
  if (diff <= 2) return { label: `剩余${diff}天`, className: 'text-yellow-600 bg-yellow-50 px-2 py-0.5 rounded', isOverdue: false };
  return { label: `剩余${diff}天`, className: 'text-gray-500 bg-gray-100 px-2 py-0.5 rounded', isOverdue: false };
}

function formatToday() {
  const d = new Date();
  return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
}

function getTimeRangeLabel(range) {

function getNewAnomalyLabel(range) {

function parseHash(raw) {
  let h = (raw || '').replace(/^#/, '');
  if (!h || h === '/') return { page: 'guide' };
  if (!h.startsWith('/')) h = '/' + h;
  const detail = h.match(/^\/supervisor\/detail\/(.+)$/);
  if (detail) return { page: 'supervisor-detail', id: decodeURIComponent(detail[1]) };
  const map = {
    '/supervisor/list': 'supervisor-list',
    '/supervisor/tracking': 'supervisor-tracking',
    '/manager/dashboard': 'manager-dashboard',
    '/manager/anomalies': 'manager-anomalies',
    '/director/dashboard': 'director-dashboard',
  };
  return { page: map[h] || 'guide' };
}

function navigateTo(hash) {
  window.location.hash = hash;
}

function useHashRoute() {
  const [route, setRoute] = useState(() => parseHash(window.location.hash));
  useEffect(() => {
    const onHash = () => setRoute(parseHash(window.location.hash));
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);
  useEffect(() => {
    if (!window.location.hash) {
      window.location.replace('#/');
    }
  }, []);
  return route;
}

function AppProvider({ children }) {
  const [role, setRole] = useState('supervisor');
  const [timeRange, setTimeRange] = useState('quarter');
  const [anomalies, setAnomalies] = useState(INITIAL_ANOMALIES);
  const updateAnomaly = useCallback((id, patch) => {
    setAnomalies((prev) => prev.map((a) => (a.id === id ? { ...a, ...patch } : a)));
  }, []);
  const setAnomalyStatus = useCallback(
    (id, status, extra) => updateAnomaly(id, { status, ...extra }),
    [updateAnomaly],
  );
  const pendingCount = useMemo(() => anomalies.filter((a) => a.status === 'pending').length, [anomalies]);
  const value = useMemo(
    () => ({ role, timeRange, anomalies, setRole, setTimeRange, updateAnomaly, setAnomalyStatus, pendingCount }),
    [role, timeRange, anomalies, updateAnomaly, setAnomalyStatus, pendingCount],
  );
  return <AppCtx.Provider value={value}>{children}</AppCtx.Provider>;
}

function SvgLineChart({ data }) {
  const w = 320;
  const h = 140;
  const pad = 16;
  const max = Math.max(...data.map((d) => d.value), 0.1);
  const coords = data.map((d, i) => {
    const x = pad + (i / Math.max(data.length - 1, 1)) * (w - pad * 2);
    const y = h - pad - (d.value / max) * (h - pad * 2);
    return { x, y, label: d.label };
  });
  const poly = coords.map((p) => `${p.x},${p.y}`).join(' ');
  const area = `${coords.map((p) => `${p.x},${p.y}`).join(' ')} ${coords[coords.length - 1].x},${h - pad} ${coords[0].x},${h - pad}`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-40">
      <defs>
        <linearGradient id="savedGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#facc15" stopOpacity="0.35" />
          <stop offset="100%" stopColor="#facc15" stopOpacity="0" />
        </linearGradient>
      </defs>
      <polygon fill="url(#savedGrad)" points={area} />
      <polyline fill="none" stroke="#facc15" strokeWidth="2.5" points={poly} />
      {coords.map((p) => (
        <circle key={p.label} cx={p.x} cy={p.y} r="4" fill="#ca8a04" />
      ))}
    </svg>
  );
}

function TrackingPage() {
  const { anomalies, setAnomalyStatus } = useApp();
  const [tab, setTab] = useState('rectifying');
  const TABS = [
    { key: 'rectifying', label: '整改中' },
    { key: 'reviewing', label: '待复查' },
    { key: 'closed', label: '已闭环' },
  ];
  const trackingList = anomalies.filter((a) => ['rectifying', 'reviewing', 'closed', 'rejected'].includes(a.status));
  const overdueCount = anomalies.filter((a) => a.status === 'rectifying' && a.deadline && getDaysRemaining(a.deadline).isOverdue).length;
  const filtered = useMemo(() => {
    if (tab === 'closed') return trackingList.filter((a) => a.status === 'closed' || a.status === 'rejected');
    return trackingList.filter((a) => a.status === tab);
  }, [trackingList, tab]);
  const tabCount = (key) => {
    if (key === 'closed') return countByStatus(anomalies, 'closed') + countByStatus(anomalies, 'rejected');
    return countByStatus(anomalies, key);
  };
  return (
    <div className="p-6 max-w-5xl mx-auto">
      <header className="mb-6">
        <h1 className="text-2xl font-bold text-gray-900">整改跟踪</h1>
        <p className="text-gray-500 text-sm mt-1">跟踪门店整改进度，确保异常闭环</p>
      </header>
      {overdueCount > 0 && (
        <div className="mb-4 flex items-center gap-2 bg-red-600 text-white text-sm px-4 py-3 rounded-lg">
          <i className="fas fa-exclamation-triangle" />
          <span>
            <strong>逾期预警：</strong>当前有 {overdueCount} 个整改工单已超过截止日期，请立即跟进处理
          </span>
        </div>
      )}
      <section className="grid grid-cols-3 gap-4 mb-6">
        <article className="rounded-xl border p-4 bg-orange-50 border-orange-200">
          <p className="text-3xl font-bold text-orange-600">{countByStatus(anomalies, 'rectifying')}</p>
          <p className="font-medium text-gray-900 mt-1">整改中</p>
        </article>
        <article className="rounded-xl border p-4 bg-purple-50 border-purple-200">
          <p className="text-3xl font-bold text-purple-600">{countByStatus(anomalies, 'reviewing')}</p>
          <p className="font-medium text-gray-900 mt-1">待复查</p>
        </article>
        <article className="rounded-xl border p-4 bg-green-50 border-green-200">
          <p className="text-3xl font-bold text-green-600">{countByStatus(anomalies, 'closed')}</p>
          <p className="font-medium text-gray-900 mt-1">已闭环</p>
        </article>
      </section>
      <nav className="flex border-b border-gray-200 mb-4 gap-6">
        {TABS.map((t) => (
          <button key={t.key} type="button" onClick={() => setTab(t.key)} className={`pb-3 text-sm font-medium flex items-center gap-2 border-b-2 ${tab === t.key ? 'border-yellow-400 text-gray-900' : 'border-transparent text-gray-500'}`}>
            {t.label}
            <span className={`text-xs px-1.5 py-0.5 rounded ${tab === t.key ? 'bg-yellow-400 text-gray-900' : 'bg-gray-200'}`}>{tabCount(t.key)}</span>
          </button>
        ))}
      </nav>
      <ul className="space-y-3">
        {filtered.map((a) => (
          <TrackingCard key={a.id} anomaly={a} onReview={() => setAnomalyStatus(a.id, 'reviewing')} onClose={() => setAnomalyStatus(a.id, 'closed')} onDetail={() => navigateTo(`#/supervisor/detail/${a.id}`)} />
        ))}
      </ul>
    </div>
  );
}

function DirectorKpiCard({ icon, label, value, unit, color, sub }) {

function InsightColumn({ title, icon, bg, items }) {
  const actionLabel = { special: '发起专项整治', resource: '调配督导资源', sop: '更新 SOP', train: '触发培训', task: '下派任务', report: '上报总监' };
  return (
    <article className={`${bg} rounded-lg p-3`}>
      <h3 className="font-medium text-sm mb-2 flex items-center gap-2">
        <i className={`fas ${icon}`} />

      </h3>
      <ul className="space-y-2">
        {items.map((item, i) => (
          <li key={i} className="text-xs text-gray-700">

            {item.recommend && (
              <p className="text-yellow-800 bg-yellow-100 inline-block mt-1 px-1.5 py-0.5 rounded">

              </p>
            )}
          </li>
        ))}
      </ul>

function DirectorAction({ color, icon, title, desc, reason, highlighted, done, onConfirm }) {
  const [confirming, setConfirming] = useState(false);
  const ic = color === 'purple' ? 'text-purple-500' : color === 'blue' ? 'text-blue-500' : color === 'red' ? 'text-red-500' : 'text-gray-500';
  const btn =
    color === 'purple'
      ? 'bg-purple-500 hover:bg-purple-600'
      : color === 'blue'
        ? 'bg-blue-500 hover:bg-blue-600'
        : color === 'red'
          ? 'bg-red-500 hover:bg-red-600'
          : 'bg-gray-600 hover:bg-gray-700';
  return (
    <article className={`bg-white border border-gray-200 rounded-xl p-4 ${highlighted ? 'ring-2 ring-yellow-400 shadow-lg' : ''}`}>
      {highlighted && <span className="text-xs bg-yellow-400 text-gray-900 px-2 py-0.5 rounded font-medium mb-2 inline-block">AI 推荐动作</span>}
      <i className={`fas ${icon} text-xl mb-2 ${ic}`} />
      <h3 className="font-medium text-sm text-gray-900">{title}</h3>
      {desc && <p className="text-xs text-gray-500 mt-1 leading-relaxed">{desc}</p>}
      {reason && <p className="text-xs text-gray-600 mt-2 mb-2 italic">判定依据：{reason}</p>}
      {done ? (
        <p className="text-xs text-green-600 mt-2">已发起，执行中</p>
      ) : confirming ? (
        <div className="flex gap-1 mt-2">
          <button type="button" onClick={() => { onConfirm(); setConfirming(false); }} className="flex-1 bg-gray-800 text-white text-xs py-1 rounded">
            确认
          </button>
          <button type="button" onClick={() => setConfirming(false)} className="flex-1 border text-xs py-1 rounded">
            取消
          </button>
        </div>
      ) : (
        <button type="button" onClick={() => setConfirming(true)} className={`mt-2 w-full text-xs py-1.5 rounded text-white ${btn}`}>
          执行
        </button>
      )}
    </article>
  );
}

function GuidePage() {
  const { setRole } = useApp();

    const t = setTimeout(() => setVisible(true), 100);
    return () => clearTimeout(t);
  }, []);
  const enter = (step) => {
    setRole(step.role);
    navigateTo(step.path);
  };
  return (
    <div className="min-h-screen bg-gray-950 text-white flex flex-col">
      <header className="text-center pt-12 pb-8 px-4">
        <div className="inline-flex items-center gap-3 mb-4">
          <span className="w-12 h-12 bg-yellow-400 rounded-xl flex items-center justify-center">
            <i className="fas fa-lemon text-gray-900 text-xl" />
          </span>
          <div className="text-left">
            <h1 className="text-2xl font-bold">林立柠檬茶</h1>
            <p className="text-gray-400 text-sm">营运 AI 管理平台 · 面试 Demo</p>
          </div>
        </div>
        <p className="text-gray-400 max-w-2xl mx-auto text-sm">配合 PRD 展示 · 回应营运部 AI 提效三大核心痛点</p>

      <div className={`flex-1 max-w-6xl mx-auto w-full px-6 grid md:grid-cols-3 gap-6 transition-all duration-500 ${visible ? 'opacity-100 translate-y-0 guide-animate' : 'opacity-0 translate-y-4'}`}>
        {GUIDE_STEPS.map((step) => (
          <article key={step.tag} className={`rounded-2xl border-2 p-6 text-gray-900 flex flex-col ${step.color}`}>
            <span className={`text-xs font-semibold px-2 py-1 rounded w-fit ${step.tagColor}`}>{step.tag}</span>
            <span className={`w-12 h-12 rounded-xl flex items-center justify-center mt-4 ${step.iconBg}`}>
              <i className={`fas ${step.icon} text-xl ${step.iconColor}`} />
            </span>
            <p className="text-xs text-gray-500 mt-4">{step.roleLabel}</p>
            <h2 className="text-lg font-bold mt-1">{step.title}</h2>
            <p className="text-sm text-gray-600 mt-3 flex-1 leading-relaxed">
              <span className="font-semibold text-gray-800 not-italic">需求：</span>
              {step.painPoint}
            </p>
            <p className="text-sm text-gray-700 mt-3 leading-relaxed">{step.design}</p>
            <button type="button" onClick={() => enter(step)} className={`mt-6 w-full py-2.5 rounded-lg font-medium text-sm ${step.btnColor}`}>

        ))}
      </div>
      <footer className="text-center py-10">
        <button type="button" onClick={() => { setRole('supervisor'); navigateTo('#/supervisor/list'); }} className="text-gray-500 hover:text-yellow-400 text-sm transition-colors">
          跳过引导，直接进入系统 →
        </button>
      </footer>
    </div>
  );
}

function AppShell() {
  const route = useHashRoute();
  const hash = typeof window !== 'undefined' ? window.location.hash : '';
  if (route.page === 'guide') {
    return <GuidePage />;
  }
  return (
    <div className="flex min-h-screen">
      <Sidebar key={hash} />
      <main className="flex-1 overflow-auto min-h-screen bg-gray-50">
        {route.page === 'supervisor-list' && <AnomalyListPage />}
        {route.page === 'supervisor-detail' && <AnomalyDetailPage id={route.id} />}
        {route.page === 'supervisor-tracking' && <TrackingPage />}
        {route.page === 'manager-dashboard' && <ManagerDashboardPage />}
        {route.page === 'manager-anomalies' && <ManagerAnomaliesPage />}
        {route.page === 'director-dashboard' && <DirectorDashboardPage />}
      </main>
    </div>
  );
}

function App() {
  return (
    <AppProvider>
      <AppShell />
    </AppProvider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
